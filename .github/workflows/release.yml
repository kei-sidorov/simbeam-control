name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Build universal release
        run: ./Scripts/build-universal.sh

      - name: Package
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="simbeam-control_${version}_darwin_universal.tar.gz"
          staging="$(mktemp -d)"
          mkdir -p "$staging/bin"
          cp .build/release/simbeam-control "$staging/bin/simbeam-control"
          tar -czf "$archive" -C "$staging" bin
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$ARCHIVE" \
            "$ARCHIVE.sha256" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
